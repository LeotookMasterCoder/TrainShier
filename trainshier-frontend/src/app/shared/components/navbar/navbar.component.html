<nav class="navbar">

  <!-- LOGO -->

  <div class="left">

    <img
      src="assets/img/BannerTrainShier2.jpeg"
      class="logo"
      routerLink="/home"
    >

  </div>

  <!-- MENÚ -->

  <div class="center">

    <a
      routerLink="/home"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{exact:true}"
    >
      Inicio
    </a>

    <a
      *ngIf="role==='APRENDIZ'"
      routerLink="/simulator"
      routerLinkActive="active-link"
    >
      Simulador
    </a>

    <a
      *ngIf="role==='APRENDIZ'"
      routerLink="/transactions"
      routerLinkActive="active-link"
    >
      Transacciones
    </a>

    <a
      *ngIf="role==='INSTRUCTOR'"
      routerLink="/evaluation"
      routerLinkActive="active-link"
    >
      Evaluaciones
    </a>

    <a
      *ngIf="role==='INSTRUCTOR'"
      routerLink="/reports"
      routerLinkActive="active-link"
    >
      Reportes
    </a>

    <a
      *ngIf="role==='ADMIN'"
      routerLink="/statistics"
      routerLinkActive="active-link"
    >
      Estadísticas
    </a>

  </div>

  <!-- ACCIONES -->

  <div class="right">

    <button
      class="theme-btn"
      (click)="toggleTheme()"
    >
      {{ darkMode ? '☀️' : '🌙' }}
    </button>

    <div
      class="profile"
      routerLink="/profile"
    >

      <img
        [src]="profileImage"
        alt="Perfil"
      >

    </div>

    <button
      *ngIf="isLoggedIn"
      class="logout-btn"
      (click)="logout()"
    >
      Salir
    </button>

  </div>

</nav>
