<div class="transaction-table">

  <h2>TRANSACTION RECORDS</h2>

  <table>

    <thead>

    <tr>
      <th>ID</th>
      <th>Date</th>
      <th>Type</th>
      <th>Client</th>
      <th>Product</th>
      <th>Quantity</th>
      <th>Total</th>
      <th>Status</th>
    </tr>

    </thead>

    <tbody>

    <tr *ngFor="let t of data">

      <td>{{t.id}}</td>
      <td>{{t.date}}</td>
      <td>{{t.type}}</td>
      <td>{{t.client}}</td>
      <td>{{t.product}}</td>
      <td>{{t.quantity}}</td>
      <td>{{t.total}}</td>

      <td>

          <span
            class="status"
            [class.success]="t.status === 'SUCCESS'"
            [class.error]="t.status === 'FAILED'"
          ></span>

      </td>

    </tr>

    </tbody>

  </table>

</div>
