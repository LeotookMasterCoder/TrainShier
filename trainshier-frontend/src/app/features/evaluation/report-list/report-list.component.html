<div class="report-page">

  <div class="hero">
    <h1>Reportes TrainShier</h1>
    <p>Control y seguimiento inteligente.</p>
  </div>

  <div class="report-grid">

    <div class="card" *ngFor="let report of reports">

      <h2>{{report.title}}</h2>

      <p>{{report.description}}</p>

      <span>{{report.status}}</span>

    </div>

  </div>

</div>
