<div class="report-container">

  <div
    class="report-card"
    *ngFor="let report of reports"
  >

    <h2>{{report.apprentice}}</h2>

    <p>
      Transacciones:
      {{report.transactions}}
    </p>

    <p>
      Tiempo promedio:
      {{report.averageTime}}
    </p>

    <p>
      Errores:
      {{report.errors}}
    </p>

    <p>
      Puntuación:
      {{report.score}}%
    </p>

    <div class="progress">

      <div
        class="bar"
        [style.width.%]="report.score"
      ></div>

    </div>

  </div>

</div>
