<div class="report-container">

  <h2>Simulation Reports</h2>

  <div class="card" *ngFor="let report of reports">

    <h3>{{report.apprentice}}</h3>

    <p>Total Transactions: {{report.transactions}}</p>

    <p>Average Time: {{report.averageTime}}</p>

    <p>Errors: {{report.errors}}</p>

    <p>Score: {{report.score}}</p>

  </div>

</div>
