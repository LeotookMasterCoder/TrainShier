<div class="report-container">

  <h2>Simulación de reportes</h2>

  <div class="card" *ngFor="let report of reports">

    <h3>{{report.apprentice}}</h3>

    <p>Total Transacciones: {{report.transactions}}</p>

    <p>Tiempo Fijo: {{report.averageTime}}</p>

    <p>Errores: {{report.errors}}</p>

    <p>Puntuación: {{report.score}}</p>

  </div>

</div>
