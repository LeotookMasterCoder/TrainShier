<div class="statistics-page">

  <div class="hero">
    <h1>Estadísticas TrainShier</h1>
    <p>Datos en tiempo real para mejorar el aprendizaje.</p>
  </div>

  <div class="stats-grid">

    <div class="stat-card" *ngFor="let stat of stats">

      <h2>{{stat.value}}</h2>

      <p>{{stat.title}}</p>

    </div>

  </div>

</div>
