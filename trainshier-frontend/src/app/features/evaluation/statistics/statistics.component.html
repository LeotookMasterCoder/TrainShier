<div class="statistics-container" *ngIf="data">

  <div class="stat-card">

    <h3>Total Simulations</h3>

    <p>{{data.totalSimulations}}</p>

  </div>

  <div class="stat-card">

    <h3>Average Score</h3>

    <p>{{data.averageScore}}</p>

  </div>

  <div class="stat-card">

    <h3>Successful Payments</h3>

    <p>{{data.successPayments}}</p>

  </div>

  <div class="stat-card">

    <h3>Rejected Sales</h3>

    <p>{{data.rejectedSales}}</p>

  </div>

</div>
