<div class="simulator-container">

  <div class="left-panel">

    <div class="client-card">

      <h2>Cliente actual</h2>

      <h3>{{currentClient.name}}</h3>

      <p>Dinero disponible: ${{currentClient.money}}</p>

      <button
        class="next-btn"
        (click)="nextClient()">
        Siguiente cliente
      </button>

    </div>

    <div class="products">

      <h2>Productos</h2>

      <div
        class="product-card"
        *ngFor="let product of products">

        <div>

          <h3>{{product.name}}</h3>

          <p>${{product.price}}</p>

        </div>

        <button (click)="addProduct(product)">
          Agregar
        </button>

      </div>

    </div>

  </div>

  <div class="right-panel">

    <div class="cashier-box">

      <h2>Caja registradora</h2>

      <div class="scanner-box">

        <h3>Escáner</h3>

        <input
          type="text"
          [(ngModel)]="barcode"
          placeholder="Código de barras">

        <button (click)="scanProduct()">
          Escanear
        </button>

      </div>

      <div class="rfid-box">

        <h3>Escaneo RFID</h3>

        <input
          type="text"
          [(ngModel)]="rfidCard"
          placeholder="Escanea tarjeta RFID">

        <button (click)="processRFID()">
          Escanear tarjeta
        </button>

      </div>

      <div class="cart">

        <div
          class="cart-item"
          *ngFor="let item of cart">

          <span>{{item.name}}</span>

          <span>${{item.price}}</span>

        </div>

      </div>

      <div class="summary">

        <h3>Total: ${{total}}</h3>

        <input
          type="number"
          [(ngModel)]="payment"
          placeholder="Dinero recibido">

      </div>

      <div class="buttons">

        <button
          class="discount"
          (click)="applyDiscount()">
          Aplicar descuento
        </button>

        <button
          class="pay"
          (click)="processPayment()">
          Cobrar
        </button>

        <button
          class="cancel"
          (click)="cancelPurchase()">
          Cancelar
        </button>

      </div>

      <div
        class="result"
        [ngClass]="success ? 'success':'error'"
        *ngIf="resultMessage">

        {{resultMessage}}

      </div>

    </div>

  </div>

</div>
