<div class="auth-container">

  <div class="auth-left">

    <div class="logo"></div>

    <h1>TrainShier</h1>

    <p>
      Cashier training simulation platform
      for SENA apprentices and instructors.
    </p>

  </div>

  <div class="auth-right">

    <div class="form-card">

      <h2>Login</h2>

      <form
        [formGroup]="form"
        (ngSubmit)="submit()"
      >

        <div class="input-group">

          <input
            type="email"
            placeholder="Email"
            formControlName="email"
            [class.invalid]="
              form.get('email')?.invalid &&
              form.get('email')?.touched
            "
          >

          <small
            *ngIf="
              form.get('email')?.hasError('required') &&
              form.get('email')?.touched
            "
          >
            Email is required
          </small>

          <small
            *ngIf="
              form.get('email')?.hasError('email') &&
              form.get('email')?.touched
            "
          >
            Invalid email format
          </small>

        </div>

        <div class="input-group">

          <input
            type="password"
            placeholder="Password"
            formControlName="password"
            [class.invalid]="
              form.get('password')?.invalid &&
              form.get('password')?.touched
            "
          >

          <small
            *ngIf="
              form.get('password')?.hasError('required') &&
              form.get('password')?.touched
            "
          >
            Password is required
          </small>

          <small
            *ngIf="
              form.get('password')?.hasError('minlength') &&
              form.get('password')?.touched
            "
          >
            Minimum 8 characters
          </small>

          <small
            *ngIf="
              form.get('password')?.hasError('pattern') &&
              form.get('password')?.touched
            "
          >
            Must contain uppercase and special character
          </small>

        </div>

        <div
          class="server-error"
          *ngIf="errorMessage"
        >
          {{errorMessage}}
        </div>

        <button
          type="submit"
          [disabled]="loading || form.invalid"
        >

          <span *ngIf="!loading">
            Login
          </span>

          <span *ngIf="loading">
            Loading...
          </span>

        </button>

      </form>

      <a routerLink="/recover-password">
        Forgot password?
      </a>

      <p>
        Don't have an account?
        <a routerLink="/register">
          Register
        </a>
      </p>

    </div>

  </div>

</div>
