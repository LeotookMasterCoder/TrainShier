<div class="auth-container">

  <div class="auth-left">

    <div class="logo"></div>

    <h1>TrainShier</h1>

    <p>
     Crea tu propia cuenta en TrainShier para mas funcionalidades.
    </p>

  </div>

  <div class="auth-right">

    <div class="form-card">

      <h2>Crear Cuenta</h2>

      <form
        [formGroup]="form"
        (ngSubmit)="submit()"
      >

        <div class="input-group">

          <input
            type="text"
            placeholder="Nombre Usuario"
            formControlName="username"
            [class.invalid]="
              form.get('username')?.invalid &&
              form.get('username')?.touched
            "
          >

          <small
            *ngIf="
              form.get('username')?.hasError('pattern') &&
              form.get('username')?.touched
            "
          >
            Ejemplo Aceptable: prueba#5462
          </small>

        </div>

        <div class="input-group">

          <input
            type="text"
            placeholder="Nombre Completo"
            formControlName="name"
          >

        </div>

        <div class="input-group">

          <input
            type="email"
            placeholder="Email"
            formControlName="email"
          >

        </div>

        <div class="input-group">

          <input
            type="password"
            placeholder="Contraseña"
            formControlName="password"
          >

          <small
            *ngIf="
              form.get('password')?.hasError('minlength') &&
              form.get('password')?.touched
            "
          >
            Minimo 8 caracteres
          </small>

          <small
            *ngIf="
              form.get('password')?.hasError('pattern') &&
              form.get('password')?.touched
            "
          >
          Debe contener una mayúscula y un caracter especial
          </small>

        </div>

        <select formControlName="role">

          <option value="ADMIN">
            Admin
          </option>

          <option value="INSTRUCTOR">
            Instructor
          </option>

          <option value="APPRENTICE">
            Aprendiz
          </option>

          <option value="OBSERVER">
            Observador
          </option>

        </select>

        <div
          class="error-message"
          *ngIf="errorMessage"
        >
          {{errorMessage}}
        </div>

        <div
          class="success-message"
          *ngIf="successMessage"
        >
          {{successMessage}}
        </div>

        <button type="submit">
          Register
        </button>

      </form>

    </div>

  </div>

</div>
