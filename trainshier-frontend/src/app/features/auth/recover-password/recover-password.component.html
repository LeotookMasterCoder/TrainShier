<div class="recover-container">

  <div class="recover-card">

    <button
      class="back-btn"
      (click)="back()"
    >
      ← Volver
    </button>

    <div class="header">

      <img
        src="assets/img/BannerTrainShier2.jpeg"
        alt="TrainShier"
      >

      <h1>Recuperar Contraseña</h1>

      <p>
        Restablece el acceso a tu cuenta
      </p>

    </div>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
    >

      <div class="input-group">

        <label>Correo electrónico</label>

        <input
          type="email"
          formControlName="email"
          placeholder="correo@gmail.com"
        >

        <small
          *ngIf="form.get('email')?.touched &&
                 form.get('email')?.invalid"
          class="error"
        >
          Ingresa un correo válido.
        </small>

      </div>

      <div class="input-group">

        <label>Nueva contraseña</label>

        <input
          type="password"
          formControlName="newPassword"
          placeholder="********"
        >

        <small class="hint">
          Mínimo 8 caracteres y 1 carácter especial.
        </small>

      </div>

      <div class="input-group">

        <label>Confirmar contraseña</label>

        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="********"
        >

      </div>

      <div
        class="error-banner"
        *ngIf="errorMessage"
      >
        {{errorMessage}}
      </div>

      <div
        class="success-banner"
        *ngIf="successMessage"
      >
        {{successMessage}}
      </div>

      <button
        class="recover-btn"
        type="submit"
      >
        Actualizar contraseña
      </button>

    </form>

  </div>

</div>
