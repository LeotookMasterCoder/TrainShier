<div class="auth-container">

  <div class="auth-card">

    <div class="logo"></div>

    <h2>Recuperación de contraseña</h2>

    <p class="subtitle">
     Agrega tu email ya con cuenta para el código de verificación
    </p>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
    >

      <input
        type="email"
        formControlName="email"
        placeholder="Email"
      >

      <button type="submit">
        Enviar código
      </button>

    </form>

    <div
      class="success-message"
      *ngIf="message"
    >
      {{message}}
    </div>

  </div>

</div>
