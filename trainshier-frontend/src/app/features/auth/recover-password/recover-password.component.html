<div class="auth-container">

  <div class="auth-card">

    <div class="logo"></div>

    <h2>Password Recovery</h2>

    <p class="subtitle">
      Enter your email to receive a verification code.
    </p>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
    >

      <input
        type="email"
        formControlName="email"
        placeholder="Email"
      >

      <button type="submit">
        Send Code
      </button>

    </form>

    <div
      class="success-message"
      *ngIf="message"
    >
      {{message}}
    </div>

  </div>

</div>
