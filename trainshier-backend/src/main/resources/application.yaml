server:
  port: 8080

jwt:
  secret: trainshier-secret-key
  expiration: 86400000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trainshier
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect